<svg xmlns="http://www.w3.org/2000/svg" width="1450" height="930" viewBox="0 0 1450 930"><style>.t{font:700 48px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;fill:#14213a}.h{font:700 27px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;fill:white}.b{font:500 22px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;fill:#26364f}.w{font:500 21px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;fill:white}.s{font:500 19px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;fill:#5b6a80}</style><rect width="1450" height="930" fill="#f5f8ff"/><text x="65" y="72" class="t">LLM 训练 / Transformer / RNN 图解地图</text><text x="68" y="112" class="s">从数据到参数更新，再到推理阶段的上下文建模</text><g transform="translate(60 170)"><rect width="230" height="120" rx="24" fill="#2e6bd6"/><text x="30" y="48" class="h">训练数据</text><text x="30" y="85" class="w">清洗 · 分词 · 批次</text></g><path d="M290 230 H360" stroke="#8394ac" stroke-width="6"/><polygon points="360,230 342,218 342,242" fill="#8394ac"/><g transform="translate(360 150)"><rect width="300" height="160" rx="26" fill="#7957c6"/><text x="30" y="48" class="h">Transformer</text><text x="30" y="88" class="w">Embedding + Position</text><text x="30" y="123" class="w">Attention + FFN</text></g><path d="M660 230 H735" stroke="#8394ac" stroke-width="6"/><polygon points="735,230 717,218 717,242" fill="#8394ac"/><g transform="translate(735 150)"><rect width="300" height="160" rx="26" fill="#e07b38"/><text x="30" y="48" class="h">损失函数</text><text x="30" y="88" class="w">预测下一个 Token</text><text x="30" y="123" class="w">Cross Entropy</text></g><path d="M1035 230 H1110" stroke="#8394ac" stroke-width="6"/><polygon points="1110,230 1092,218 1092,242" fill="#8394ac"/><g transform="translate(1110 150)"><rect width="280" height="160" rx="26" fill="#17916d"/><text x="30" y="48" class="h">反向传播</text><text x="30" y="88" class="w">梯度 · 优化器</text><text x="30" y="123" class="w">更新参数</text></g><g transform="translate(70 380)"><rect width="400" height="215" rx="28" fill="#ffffff" stroke="#b6c6de" stroke-width="3"/><text x="30" y="52" class="b" style="font-weight:700">Attention 如何计算</text><text x="30" y="95" class="b">Q = XWq，K = XWk，V = XWv</text><text x="30" y="137" class="b">softmax(QKᵀ / √d) · V</text><text x="30" y="180" class="b">每个 Token 动态聚合上下文</text></g><g transform="translate(525 380)"><rect width="400" height="215" rx="28" fill="#ffffff" stroke="#b6c6de" stroke-width="3"/><text x="30" y="52" class="b" style="font-weight:700">Transformer vs RNN</text><text x="30" y="95" class="b">Transformer：并行处理整个序列</text><text x="30" y="137" class="b">RNN：按时间步串行传递状态</text><text x="30" y="180" class="b">长依赖与训练效率差异明显</text></g><g transform="translate(980 380)"><rect width="400" height="215" rx="28" fill="#ffffff" stroke="#b6c6de" stroke-width="3"/><text x="30" y="52" class="b" style="font-weight:700">Scaling Law</text><text x="30" y="95" class="b">参数量 · 数据量 · 计算量</text><text x="30" y="137" class="b">共同决定训练损失下降趋势</text><text x="30" y="180" class="b">扩大规模需要平衡三者</text></g><g transform="translate(120 680)"><rect width="1210" height="120" rx="30" fill="#19375f"/><text x="45" y="52" class="h">推理阶段：Prompt Token → 多层 Transformer → 概率分布 → 采样下一个 Token → 循环生成</text><text x="45" y="91" class="w">训练学参数，推理使用参数；上下文压缩与 KV Cache 影响长对话效率。</text></g></svg>