<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="960" viewBox="0 0 1500 960"><style>.t{font:700 48px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;fill:#13213b}.h{font:700 27px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;fill:white}.b{font:500 22px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;fill:#26364f}.w{font:500 21px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;fill:white}.s{font:500 19px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;fill:#5b6a80}</style><rect width="1500" height="960" fill="#f5f8ff"/><text x="65" y="72" class="t">AI Agent / OpenClaw / Codex 图解总览</text><text x="68" y="112" class="s">从用户目标到工具执行、观察、压缩上下文与持续迭代</text><g transform="translate(55 165)"><rect width="220" height="110" rx="24" fill="#295fca"/><text x="30" y="48" class="h">用户目标</text><text x="30" y="82" class="w">任务 / 约束 / 文件</text></g><path d="M275 220 H350" stroke="#8092ad" stroke-width="6"/><polygon points="350,220 332,208 332,232" fill="#8092ad"/><g transform="translate(350 145)"><rect width="300" height="150" rx="26" fill="#6e54c8"/><text x="30" y="46" class="h">Harness 编排层</text><text x="30" y="84" class="w">Plan → Act → Observe</text><text x="30" y="118" class="w">重试 · 并发 · 状态机</text></g><path d="M650 220 H730" stroke="#8092ad" stroke-width="6"/><polygon points="730,220 712,208 712,232" fill="#8092ad"/><g transform="translate(730 145)"><rect width="300" height="150" rx="26" fill="#e07839"/><text x="30" y="46" class="h">模型决策</text><text x="30" y="84" class="w">Prompt · Tool Calling</text><text x="30" y="118" class="w">Plan / Agent 模式</text></g><path d="M1030 220 H1110" stroke="#8092ad" stroke-width="6"/><polygon points="1110,220 1092,208 1092,232" fill="#8092ad"/><g transform="translate(1110 145)"><rect width="320" height="150" rx="26" fill="#15906d"/><text x="30" y="46" class="h">工具与执行环境</text><text x="30" y="84" class="w">Skill · MCP · Plugin</text><text x="30" y="118" class="w">Shell · Browser · API</text></g><g transform="translate(70 380)"><rect width="410" height="190" rx="28" fill="#ffffff" stroke="#b7c7df" stroke-width="3"/><text x="28" y="48" class="b" style="font-weight:700">上下文与记忆</text><text x="28" y="88" class="b">Session transcript / Memory</text><text x="28" y="125" class="b">压缩 · 摘要 · 二次检索</text><text x="28" y="162" class="b">向量索引 · 缓存 · 检索</text></g><g transform="translate(545 380)"><rect width="410" height="190" rx="28" fill="#ffffff" stroke="#b7c7df" stroke-width="3"/><text x="28" y="48" class="b" style="font-weight:700">沙箱与隔离</text><text x="28" y="88" class="b">Codex sandbox / OpenClaw sandbox</text><text x="28" y="125" class="b">权限 · 文件系统 · 网络策略</text><text x="28" y="162" class="b">Firecracker / 容器 / microVM</text></g><g transform="translate(1020 380)"><rect width="410" height="190" rx="28" fill="#ffffff" stroke="#b7c7df" stroke-width="3"/><text x="28" y="48" class="b" style="font-weight:700">多 Agent 协作</text><text x="28" y="88" class="b">主 Agent → 子 Agent</text><text x="28" y="125" class="b">任务拆分 · 结果汇总</text><text x="28" y="162" class="b">并发控制 · 共享上下文</text></g><path d="M1270 295 C1270 640 950 700 750 700 C520 700 250 630 250 570" fill="none" stroke="#e07839" stroke-width="6" stroke-dasharray="12 10"/><polygon points="250,570 238,590 262,590" fill="#e07839"/><text x="575" y="750" class="b">观察结果回到 Harness：更新状态、修正计划、继续执行或结束</text><g transform="translate(180 805)"><rect width="1140" height="90" rx="28" fill="#18345d"/><text x="55" y="56" class="h">差异不只在模型：Harness、工具质量、上下文工程、沙箱、缓存与评测共同决定 Agent 是否好用</text></g></svg>