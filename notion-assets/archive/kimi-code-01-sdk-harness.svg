<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#4b5563"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; }
    </style>
  </defs>
  <rect x="0" y="0" width="1600" height="1000" rx="28" fill="#fbfaf8"/>
  <rect x="34" y="34" width="1532" height="932" rx="24" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="80" y="95" text-anchor="start" font-size="34" font-weight="780" fill="#151515">01 SDK Harness 与 CLI 入口</text>
  <text x="80" y="133" text-anchor="start" font-size="18" font-weight="520" fill="#667085">CLIOptions 如何变成 Harness / Session / TUI 或 headless turn</text>
  
  <g id="terminal">
    <rect x="90" y="210" width="320" height="100" rx="12" fill="#eef6ff" stroke="#8d949e" stroke-width="2"/>
    <text x="250" y="245" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">Terminal</text>
<text x="250" y="276" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">kimi / kimi -p / kimi acp</text>
  </g>

  <g id="main">
    <rect x="490" y="210" width="320" height="100" rx="12" fill="#f3f4f6" stroke="#8d949e" stroke-width="2"/>
    <text x="650" y="245" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">main.ts</text>
<text x="650" y="276" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">createProgram(version, handlers)</text>
  </g>

  <g id="validate">
    <rect x="890" y="210" width="320" height="100" rx="12" fill="#fff7ed" stroke="#8d949e" stroke-width="2"/>
    <text x="1050" y="245" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">validateOptions(opts)</text>
<text x="1050" y="276" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">冲突参数先被挡住</text>
  </g>

  <g id="prompt">
    <rect x="275" y="450" width="330" height="105" rx="12" fill="#f0fdf4" stroke="#8d949e" stroke-width="2"/>
    <text x="440" y="487.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">runPrompt(opts, version)</text>
<text x="440" y="518.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">uiMode=print / opts.prompt</text>
  </g>

  <g id="shell">
    <rect x="815" y="450" width="330" height="105" rx="12" fill="#f0fdf4" stroke="#8d949e" stroke-width="2"/>
    <text x="980" y="487.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">runShell(opts, version)</text>
<text x="980" y="518.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">interactive TUI</text>
  </g>

  <g id="harness">
    <rect x="545" y="690" width="420" height="115" rx="12" fill="#eff6ff" stroke="#8d949e" stroke-width="2"/>
    <text x="755" y="732.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">createKimiHarness</text>
<text x="755" y="763.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">{homeDir, identity, telemetry, uiMode}</text>
  </g>

  <g id="session">
    <rect x="230" y="850" width="350" height="95" rx="12" fill="#f3f4f6" stroke="#8d949e" stroke-width="2"/>
    <text x="405" y="882.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">SDK Session</text>
<text x="405" y="913.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">create/resume/reload/fork</text>
  </g>

  <g id="tui">
    <rect x="930" y="850" width="350" height="95" rx="12" fill="#f3f4f6" stroke="#8d949e" stroke-width="2"/>
    <text x="1105" y="882.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">KimiTUI</text>
<text x="1105" y="913.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">{cliOptions, workDir, version}</text>
  </g>

  <g>
    <path d="M 410 260 L 490 260" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="280" y="235" width="340" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="450" y="260" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">argv -&gt; CLIOptions</text>
  </g>

  <g>
    <path d="M 810 260 L 890 260" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="680" y="235" width="340" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="850" y="260" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">opts</text>
  </g>

  <g>
    <path d="M 990 310 L 440 450" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="545" y="355" width="340" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="715" y="380" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">print / prompt</text>
  </g>

  <g>
    <path d="M 1090 310 L 980 450" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="865" y="355" width="340" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="1035" y="380" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">shell mode</text>
  </g>

  <g>
    <path d="M 440 555 L 645 690" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="372.5" y="597.5" width="340" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="542.5" y="622.5" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">create harness</text>
  </g>

  <g>
    <path d="M 980 555 L 865 690" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="752.5" y="597.5" width="340" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="922.5" y="622.5" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">create harness</text>
  </g>

  <g>
    <path d="M 650 805 L 405 850" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="357.5" y="802.5" width="340" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="527.5" y="827.5" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">resolvePromptSession</text>
  </g>

  <g>
    <path d="M 860 805 L 1105 850" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="812.5" y="802.5" width="340" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="982.5" y="827.5" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">new KimiTUI(harness, ...)</text>
  </g>
</svg>