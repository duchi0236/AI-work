<svg xmlns="http://www.w3.org/2000/svg" width="1450" height="900" viewBox="0 0 1450 900"><style>.t{font:700 48px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;fill:#14213a}.h{font:700 28px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;fill:white}.b{font:500 22px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;fill:#27374f}.w{font:500 21px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;fill:white}.s{font:500 19px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;fill:#5b6a80}</style><rect width="1450" height="900" fill="#f5f8ff"/><text x="65" y="72" class="t">系统与基础设施图解地图</text><text x="68" y="112" class="s">沙箱、microVM、Computer Use 与安全隔离</text><g transform="translate(70 175)"><rect width="360" height="185" rx="28" fill="#2d6cdf"/><text x="28" y="50" class="h">Firecracker microVM</text><text x="28" y="92" class="w">KVM + 极简设备模型</text><text x="28" y="130" class="w">毫秒级启动 · 强隔离</text></g><g transform="translate(545 175)"><rect width="360" height="185" rx="28" fill="#7a58c7"/><text x="28" y="50" class="h">Agent Sandbox</text><text x="28" y="92" class="w">文件系统 · 网络 · 权限</text><text x="28" y="130" class="w">进程限制 · 资源配额</text></g><g transform="translate(1020 175)"><rect width="360" height="185" rx="28" fill="#15916d"/><text x="28" y="50" class="h">Computer Use</text><text x="28" y="92" class="w">截图 / DOM / 可访问树</text><text x="28" y="130" class="w">规划动作 → 点击 → 观察</text></g><path d="M250 360 C250 465 360 520 500 520" fill="none" stroke="#9aabc2" stroke-width="6"/><path d="M725 360 V520" fill="none" stroke="#9aabc2" stroke-width="6"/><path d="M1200 360 C1200 465 1090 520 950 520" fill="none" stroke="#9aabc2" stroke-width="6"/><g transform="translate(390 500)"><rect width="670" height="205" rx="30" fill="#ffffff" stroke="#b8c7dd" stroke-width="3"/><text x="35" y="52" class="b" style="font-weight:700">统一安全边界</text><text x="35" y="97" class="b">身份与授权：谁可以调用什么工具</text><text x="35" y="137" class="b">执行与隔离：在哪里运行、可以访问哪些资源</text><text x="35" y="177" class="b">审计与恢复：记录动作、支持终止、回滚和重试</text></g><g transform="translate(170 765)"><rect width="1110" height="85" rx="26" fill="#18365e"/><text x="45" y="54" class="h">安全不是单个沙箱能力，而是权限策略、运行时隔离、观测审计与用户控制共同组成。</text></g></svg>