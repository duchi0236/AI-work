<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#4b5563"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; }
    </style>
  </defs>
  <rect x="0" y="0" width="1600" height="1000" rx="28" fill="#fbfaf8"/>
  <rect x="34" y="34" width="1532" height="932" rx="24" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="80" y="95" text-anchor="start" font-size="34" font-weight="780" fill="#151515">05 kosong Provider 抽象</text>
  <text x="80" y="133" text-anchor="start" font-size="18" font-weight="520" fill="#667085">统一 Message / Tool / Usage，让 loop 不绑定具体模型厂商</text>
  
  <g id="params">
    <rect x="80" y="210" width="380" height="105" rx="12" fill="#eef6ff" stroke="#8d949e" stroke-width="2"/>
    <text x="270" y="247.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">chatParams</text>
<text x="270" y="278.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">{messages, tools, signal, callbacks}</text>
  </g>

  <g id="llm">
    <rect x="560" y="210" width="360" height="105" rx="12" fill="#f0fdf4" stroke="#8d949e" stroke-width="2"/>
    <text x="740" y="247.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">kosong LLM</text>
<text x="740" y="278.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">统一接口</text>
  </g>

  <g id="provider">
    <rect x="1020" y="210" width="360" height="105" rx="12" fill="#fff7ed" stroke="#8d949e" stroke-width="2"/>
    <text x="1200" y="247.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">Provider adapter</text>
<text x="1200" y="278.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">kimi / openai / anthropic / google</text>
  </g>

  <g id="request">
    <rect x="1020" y="445" width="360" height="105" rx="12" fill="#eef2ff" stroke="#8d949e" stroke-width="2"/>
    <text x="1200" y="482.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">Provider request</text>
<text x="1200" y="513.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">厂商特定 schema</text>
  </g>

  <g id="raw">
    <rect x="560" y="445" width="360" height="105" rx="12" fill="#f8fafc" stroke="#8d949e" stroke-width="2"/>
    <text x="740" y="482.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">Raw response</text>
<text x="740" y="513.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">stream / tool calls / usage</text>
  </g>

  <g id="normalized">
    <rect x="80" y="445" width="380" height="105" rx="12" fill="#f0fdf4" stroke="#8d949e" stroke-width="2"/>
    <text x="270" y="482.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">LLMChatResponse</text>
<text x="270" y="513.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">{toolCalls, usage, finishReason}</text>
  </g>

  <g id="loop">
    <rect x="560" y="700" width="360" height="105" rx="12" fill="#fefce8" stroke="#8d949e" stroke-width="2"/>
    <text x="740" y="737.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">agent loop</text>
<text x="740" y="768.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">只消费统一形状</text>
  </g>

  <g>
    <path d="M 460 262 L 560 262" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="340" y="237" width="340" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="510" y="262" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">normalized input</text>
  </g>

  <g>
    <path d="M 920 262 L 1020 262" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="800" y="237" width="340" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="970" y="262" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">select adapter</text>
  </g>

  <g>
    <path d="M 1200 315 L 1200 445" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="1030" y="355" width="340" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="1200" y="380" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">serialize</text>
  </g>

  <g>
    <path d="M 1020 498 L 920 498" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="800" y="473" width="340" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="970" y="498" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">raw result</text>
  </g>

  <g>
    <path d="M 560 498 L 460 498" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="340" y="473" width="340" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="510" y="498" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">normalize</text>
  </g>

  <g>
    <path d="M 270 550 L 740 700" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="335" y="600" width="340" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="505" y="625" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">toolCalls + usage</text>
  </g>
</svg>