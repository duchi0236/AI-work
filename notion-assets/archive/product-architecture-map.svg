<svg xmlns="http://www.w3.org/2000/svg" width="1450" height="940" viewBox="0 0 1450 940"><style>.t{font:700 48px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;fill:#14213a}.h{font:700 28px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;fill:white}.b{font:500 22px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;fill:#27374f}.w{font:500 21px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;fill:white}.s{font:500 19px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;fill:#5b6a80}</style><rect width="1450" height="940" fill="#f5f8ff"/><text x="65" y="72" class="t">产品与系统架构图解地图</text><text x="68" y="112" class="s">ClawNote、EduFlow 与 AI Coding 产品的流程、页面和系统分层</text><g transform="translate(65 170)"><rect width="390" height="190" rx="28" fill="#2d6cdf"/><text x="28" y="50" class="h">ClawNote</text><text x="28" y="92" class="w">文档是 Source of Truth</text><text x="28" y="130" class="w">索引 / Memory / Agent Skill</text></g><g transform="translate(530 170)"><rect width="390" height="190" rx="28" fill="#7a58c7"/><text x="28" y="50" class="h">EduFlow</text><text x="28" y="92" class="w">老师 Web + 小程序</text><text x="28" y="130" class="w">家长端 + 作业闭环</text></g><g transform="translate(995 170)"><rect width="390" height="190" rx="28" fill="#15916d"/><text x="28" y="50" class="h">AI Coding 产品</text><text x="28" y="92" class="w">Repo 索引 → Context</text><text x="28" y="130" class="w">LLM → Patch → Test</text></g><g transform="translate(85 445)"><rect width="350" height="210" rx="28" fill="#ffffff" stroke="#b8c8de" stroke-width="3"/><text x="28" y="52" class="b" style="font-weight:700">用户与界面层</text><text x="28" y="95" class="b">文档树 / 编辑器 / 工作台</text><text x="28" y="135" class="b">老师端 / 家长端 / 管理端</text><text x="28" y="175" class="b">聊天、代码与可视化输出</text></g><g transform="translate(550 445)"><rect width="350" height="210" rx="28" fill="#ffffff" stroke="#b8c8de" stroke-width="3"/><text x="28" y="52" class="b" style="font-weight:700">业务与编排层</text><text x="28" y="95" class="b">任务流 / 状态流 / 权限流</text><text x="28" y="135" class="b">Agent / Skill / Workflow</text><text x="28" y="175" class="b">反馈、审核与闭环</text></g><g transform="translate(1015 445)"><rect width="350" height="210" rx="28" fill="#ffffff" stroke="#b8c8de" stroke-width="3"/><text x="28" y="52" class="b" style="font-weight:700">数据与基础设施</text><text x="28" y="95" class="b">PostgreSQL + pgvector</text><text x="28" y="135" class="b">Redis / Object Storage</text><text x="28" y="175" class="b">Docker / CI/CD / Monitoring</text></g><path d="M260 360 V445" stroke="#96a7bd" stroke-width="6"/><path d="M725 360 V445" stroke="#96a7bd" stroke-width="6"/><path d="M1190 360 V445" stroke="#96a7bd" stroke-width="6"/><g transform="translate(150 760)"><rect width="1150" height="95" rx="28" fill="#18365e"/><text x="45" y="58" class="h">产品图解统一关注：角色是谁 → 页面做什么 → 状态如何流转 → 后端如何承接 → 数据如何沉淀</text></g></svg>