 · 最小堆 · Trie · Map</text></g><g transform="translate(940 405)"><rect width="390" height="190" rx="26" fill="#2e849d"/><text x="28" y="52" class="h">数组 / 区间 / 二分</text><text x="28" y="95" class="b" fill="white">31、33、56、121、128</text><text x="28" y="135" class="b" fill="white">有序性 · 边界 · 区间合并</text></g><path d="M265 690 H1135" stroke="#afbdd0" stroke-width="5"/><circle cx="265" cy="690" r="10" fill="#2d6cdf"/><circle cx="1135" cy="690" r="10" fill="#159b72"/><text x="320" y="745" class="b">统一学习方式：图解状态变化 → JavaScript 代码 → 复杂度 → 易错点</text><text x="320" y="790" class="s">所有后续 LeetCode 图解继续使用 JavaScript，不使用 Python。</text></svg>