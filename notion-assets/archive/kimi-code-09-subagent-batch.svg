<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#4b5563"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; }
    </style>
  </defs>
  <rect x="0" y="0" width="1600" height="1000" rx="28" fill="#fbfaf8"/>
  <rect x="34" y="34" width="1532" height="932" rx="24" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="80" y="95" text-anchor="start" font-size="34" font-weight="780" fill="#151515">09 SubagentHost / SubagentBatch</text>
  <text x="80" y="133" text-anchor="start" font-size="18" font-weight="520" fill="#667085">父 Agent 如何把局部任务派给隔离上下文中的子 Agent</text>
  
  <g id="parent">
    <rect x="80" y="190" width="360" height="105" rx="12" fill="#eef6ff" stroke="#8d949e" stroke-width="2"/>
    <text x="260" y="227.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">Parent Agent</text>
<text x="260" y="258.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">main context</text>
  </g>

  <g id="tool">
    <rect x="520" y="190" width="360" height="105" rx="12" fill="#fefce8" stroke="#8d949e" stroke-width="2"/>
    <text x="700" y="227.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">Agent / AgentSwarm tool</text>
<text x="700" y="258.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">{prompt, prompt_template, items}</text>
  </g>

  <g id="host">
    <rect x="960" y="190" width="390" height="105" rx="12" fill="#f0fdf4" stroke="#8d949e" stroke-width="2"/>
    <text x="1155" y="227.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">SessionSubagentHost.spawn</text>
<text x="1155" y="258.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">{type: sub, parentAgentId}</text>
  </g>

  <g id="single">
    <rect x="260" y="450" width="340" height="105" rx="12" fill="#f8fafc" stroke="#8d949e" stroke-width="2"/>
    <text x="430" y="487.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">Single child</text>
<text x="430" y="518.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">prompt -&gt; child.turn</text>
  </g>

  <g id="batch">
    <rect x="770" y="450" width="380" height="105" rx="12" fill="#eef2ff" stroke="#8d949e" stroke-width="2"/>
    <text x="960" y="487.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">SubagentBatch</text>
<text x="960" y="518.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">items -&gt; parallel child prompts</text>
  </g>

  <g id="child">
    <rect x="520" y="690" width="420" height="105" rx="12" fill="#f0fdf4" stroke="#8d949e" stroke-width="2"/>
    <text x="730" y="727.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">Child Agents</text>
<text x="730" y="758.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">own context + loop + tools</text>
  </g>

  <g id="result">
    <rect x="520" y="850" width="420" height="90" rx="12" fill="#fff1f2" stroke="#8d949e" stroke-width="2"/>
    <text x="730" y="880" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">final answers only</text>
<text x="730" y="911" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">tool.result returned to parent</text>
  </g>

  <g>
    <path d="M 440 242 L 520 242" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="310" y="217" width="340" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="480" y="242" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">model tool call</text>
  </g>

  <g>
    <path d="M 880 242 L 960 242" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="750" y="217" width="340" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="920" y="242" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">spawn input</text>
  </g>

  <g>
    <path d="M 1040 295 L 430 450" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="565" y="347.5" width="340" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="735" y="372.5" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">single prompt</text>
  </g>

  <g>
    <path d="M 1150 295 L 960 450" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="885" y="347.5" width="340" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="1055" y="372.5" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">batch items</text>
  </g>

  <g>
    <path d="M 430 555 L 730 690" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="410" y="597.5" width="340" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="580" y="622.5" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">child session</text>
  </g>

  <g>
    <path d="M 960 555 L 730 690" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="675" y="597.5" width="340" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="845" y="622.5" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">parallel children</text>
  </g>

  <g>
    <path d="M 730 795 L 730 850" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="560" y="797.5" width="340" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="730" y="822.5" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">summaries</text>
  </g>

  <g>
    <path d="M 520 895 L 250 895 L 250 295" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="190" y="870" width="360" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="370" y="895" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">parent sees result, not child logs</text>
  </g>
</svg>