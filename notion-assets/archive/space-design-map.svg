<svg xmlns="http://www.w3.org/2000/svg" width="1450" height="930" viewBox="0 0 1450 930"><style>.t{font:700 48px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;fill:#14213a}.h{font:700 28px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;fill:white}.b{font:500 22px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;fill:#27374f}.w{font:500 21px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;fill:white}.s{font:500 19px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;fill:#5b6a80}</style><rect width="1450" height="930" fill="#f7f8f4"/><text x="65" y="72" class="t">空间与室内设计图解地图</text><text x="68" y="112" class="s">从原始户型问题到四套布局方案与风格落地</text><g transform="translate(70 170)"><rect width="300" height="180" rx="28" fill="#546e5d"/><text x="28" y="50" class="h">方案 1</text><text x="28" y="90" class="w">保守四房</text><text x="28" y="128" class="w">低成本修正动线</text></g><g transform="translate(405 170)"><rect width="300" height="180" rx="28" fill="#a36d43"/><text x="28" y="50" class="h">方案 2</text><text x="28" y="90" class="w">三房大 LDK</text><text x="28" y="128" class="w">餐厨成为家庭中心</text></g><g transform="translate(740 170)"><rect width="300" height="180" rx="28" fill="#7b668f"/><text x="28" y="50" class="h">方案 3</text><text x="28" y="90" class="w">主卧套房</text><text x="28" y="128" class="w">强化私密与收纳</text></g><g transform="translate(1075 170)"><rect width="300" height="180" rx="28" fill="#4f7f8f"/><text x="28" y="50" class="h">方案 4</text><text x="28" y="90" class="w">多代 / 二孩</text><text x="28" y="128" class="w">保留房间与学习区</text></g><g transform="translate(90 435)"><rect width="390" height="220" rx="30" fill="#ffffff" stroke="#c7cec2" stroke-width="3"/><text x="30" y="52" class="b" style="font-weight:700">空间问题</text><text x="30" y="96" class="b">采光、通风、动线、收纳</text><text x="30" y="138" class="b">厨房与客餐厅关系</text><text x="30" y="180" class="b">家庭成员与未来变化</text></g><g transform="translate(530 435)"><rect width="390" height="220" rx="30" fill="#ffffff" stroke="#c7cec2" stroke-width="3"/><text x="30" y="52" class="b" style="font-weight:700">设计策略</text><text x="30" y="96" class="b">功能分区与可变空间</text><text x="30" y="138" class="b">公共区开放、私区安静</text><text x="30" y="180" class="b">家具尺寸反推布局</text></g><g transform="translate(970 435)"><rect width="390" height="220" rx="30" fill="#ffffff" stroke="#c7cec2" stroke-width="3"/><text x="30" y="52" class="b" style="font-weight:700">风格落地</text><text x="30" y="96" class="b">简约原木 + 温暖照明</text><text x="30" y="138" class="b">苹果式克制与留白</text><text x="30" y="180" class="b">材质、色彩与收纳统一</text></g><g transform="translate(175 760)"><rect width="1100" height="90" rx="28" fill="#475d4f"/><text x="45" y="56" class="h">户型图解不是只画家具，而是把家庭目标、结构限制、动线与未来变化转化为可执行方案。</text></g></svg>