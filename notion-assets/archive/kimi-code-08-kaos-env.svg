<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#4b5563"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; }
    </style>
  </defs>
  <rect x="0" y="0" width="1600" height="1000" rx="28" fill="#fbfaf8"/>
  <rect x="34" y="34" width="1532" height="932" rx="24" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="80" y="95" text-anchor="start" font-size="34" font-weight="780" fill="#151515">08 kaos 执行环境</text>
  <text x="80" y="133" text-anchor="start" font-size="18" font-weight="520" fill="#667085">统一文件和进程接口，实际落到 local 或 ssh</text>
  
  <g id="execute">
    <rect x="80" y="210" width="370" height="105" rx="12" fill="#eef6ff" stroke="#8d949e" stroke-width="2"/>
    <text x="265" y="247.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">Tool execute()</text>
<text x="265" y="278.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">{cwd, path, command, env, stdin}</text>
  </g>

  <g id="current">
    <rect x="540" y="210" width="360" height="105" rx="12" fill="#f0fdf4" stroke="#8d949e" stroke-width="2"/>
    <text x="720" y="247.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">current kaos</text>
<text x="720" y="278.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">injected / AsyncLocalStorage</text>
  </g>

  <g id="choice">
    <rect x="980" y="210" width="360" height="105" rx="12" fill="#fff7ed" stroke="#8d949e" stroke-width="2"/>
    <text x="1160" y="247.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">Kaos implementation</text>
<text x="1160" y="278.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">LocalKaos or SSHKaos</text>
  </g>

  <g id="local">
    <rect x="260" y="470" width="360" height="105" rx="12" fill="#f8fafc" stroke="#8d949e" stroke-width="2"/>
    <text x="440" y="507.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">LocalKaos</text>
<text x="440" y="538.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">fs + child_process.spawn</text>
  </g>

  <g id="ssh">
    <rect x="900" y="470" width="360" height="105" rx="12" fill="#eef2ff" stroke="#8d949e" stroke-width="2"/>
    <text x="1080" y="507.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">SSHKaos</text>
<text x="1080" y="538.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">ssh2 + SFTP + remote exec</text>
  </g>

  <g id="process">
    <rect x="580" y="720" width="360" height="105" rx="12" fill="#f0fdf4" stroke="#8d949e" stroke-width="2"/>
    <text x="760" y="757.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">KaosProcess / file result</text>
<text x="760" y="788.5" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">stdout / stderr / stat / content</text>
  </g>

  <g id="toolresult">
    <rect x="580" y="875" width="360" height="80" rx="12" fill="#fff1f2" stroke="#8d949e" stroke-width="2"/>
    <text x="760" y="900" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">normalized tool output</text>
<text x="760" y="931" text-anchor="middle" font-size="24" font-weight="560" fill="#151515">-&gt; tool.result</text>
  </g>

  <g>
    <path d="M 450 262 L 540 262" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="325" y="237" width="340" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="495" y="262" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">execution params</text>
  </g>

  <g>
    <path d="M 900 262 L 980 262" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="770" y="237" width="340" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="940" y="262" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">select env</text>
  </g>

  <g>
    <path d="M 1070 315 L 440 470" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="585" y="367.5" width="340" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="755" y="392.5" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">local</text>
  </g>

  <g>
    <path d="M 1160 315 L 1080 470" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="950" y="367.5" width="340" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="1120" y="392.5" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">ssh</text>
  </g>

  <g>
    <path d="M 440 575 L 760 720" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="430" y="622.5" width="340" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="600" y="647.5" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">local result</text>
  </g>

  <g>
    <path d="M 1080 575 L 760 720" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="750" y="622.5" width="340" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="920" y="647.5" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">remote result</text>
  </g>

  <g>
    <path d="M 760 825 L 760 875" fill="none" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="590" y="825" width="340" height="38" rx="8" fill="#ffffff" stroke="#d6d9de"/>
       <text x="760" y="850" text-anchor="middle" font-size="16" font-weight="560" fill="#374151">normalize</text>
  </g>
</svg>